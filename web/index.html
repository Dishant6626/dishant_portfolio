<!DOCTYPE html>
<html lang="en">
<head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- SEO Meta Tags -->
    <meta content="Dishant Patel - Flutter & Native Android Developer with 5+ years of experience. Specializing in Dart, Kotlin, Java, BLoC, Riverpod, and cross-platform mobile development."
          name="description">
    <meta content="Dishant Patel, Flutter Developer, Android Developer, Dart, Kotlin, Mobile App Developer, Gujarat, India, BLoC, Riverpod"
          name="keywords">
    <meta content="Dishant Patel" name="author">

    <!-- Open Graph -->
    <meta content="Dishant Patel | Flutter & Android Developer" property="og:title">
    <meta content="Results-driven Flutter & Native Android Developer with 5+ years of experience building high-performance mobile and web applications."
          property="og:description">
    <meta content="website" property="og:type">

    <!-- Twitter Card -->
    <meta content="summary_large_image" name="twitter:card">
    <meta content="Dishant Patel | Flutter & Android Developer" name="twitter:title">
    <meta content="Flutter & Native Android Developer · 5+ Years · Kheda, Gujarat"
          name="twitter:description">

    <!-- Favicon -->
    <link href="favicon.png" rel="icon" type="image/png"/>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
          rel="stylesheet">

    <title>Dishant Patel | Flutter & Android Developer</title>

    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }

        html, body {
          height: 100%;
          background-color: #0D1117;
          font-family: 'Inter', sans-serif;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
          width: 6px;
        }
        ::-webkit-scrollbar-track {
          background: #0D1117;
        }
        ::-webkit-scrollbar-thumb {
          background: #30363D;
          border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
          background: #00D9A6;
        }

        /* Loading screen */
        #loading {
          position: fixed;
          inset: 0;
          background: #0D1117;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          gap: 20px;
        }

        #loading .logo {
          width: 56px;
          height: 56px;
          background: #00D9A6;
          border-radius: 14px;
          display: flex;
          align-items: center;
          justify-content: center;
          font-weight: 800;
          font-size: 20px;
          color: #0D1117;
          font-family: 'Inter', sans-serif;
        }

        #loading .spinner {
          width: 36px;
          height: 36px;
          border: 2px solid #30363D;
          border-top-color: #00D9A6;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }

        #loading p {
          color: #8B949E;
          font-size: 14px;
          letter-spacing: 0.5px;
        }

        @keyframes spin {
          to { transform: rotate(360deg); }
        }

        /* Smooth fade-out for loader */
        #loading.fade-out {
          opacity: 0;
          transition: opacity 0.4s ease;
          pointer-events: none;
        }
    </style>
</head>
<body>
<!-- Loading Screen -->
<div id="loading">
    <div class="logo">DP</div>
    <div class="spinner"></div>
    <p>Loading Portfolio...</p>
</div>

<script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loading');
      loader.classList.add('fade-out');
      setTimeout(() => loader.remove(), 400);
    });
</script>

<script async src="flutter_bootstrap.js"></script>
</body>
</html>
