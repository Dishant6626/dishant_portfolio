name: dishant_portfolio
description: Dishant Patel — Flutter & Native Android Developer Portfolio
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # ── BLoC ─────────────────────────────────────────────────────────────────
  bloc: ^9.2.0
  flutter_bloc: ^9.1.1

  # ── Firebase ─────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── UI / Fonts ────────────────────────────────────────────────────────────
  google_fonts: ^6.1.0
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.2.3
  animated_text_kit: ^4.2.2

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.9.0
  http: ^1.6.0

  # ── Utils ─────────────────────────────────────────────────────────────────
  url_launcher: ^6.2.1
  equatable: ^2.0.5
  get_it: ^9.2.0
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  logger: ^2.6.2
  intl: ^0.20.2
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: 2.4.13

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    - assets/icons/

  fonts:
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
          weight: 400
        - asset: assets/fonts/Lato-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
